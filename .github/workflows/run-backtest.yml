name: Run Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run main
        run: |
          printf "6\nall\n\n300\n600\ny\ny\n" | python main.py

      - name: Show Summary
        run: |
          echo "===== SUMMARY ====="
          cat backtest_multi_recent_summary.json

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            *.json
            *.csv
