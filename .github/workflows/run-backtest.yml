name: Run Backtest Orchestrator

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [A, B, C, D]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Orchestrator
        run: |
          printf "9\n${{ matrix.group }}\n\n100\n90\ny\nn\n" | python main.py

      - name: Show Summary
        run: |
          echo "===== ORCHESTRATOR SUMMARY ====="
          find orchestrator_results -name "*.json" -maxdepth 2 -type f -print
          cat orchestrator_results/*.json || true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ matrix.group }}
          path: |
            *.json
            *.csv
            orchestrator_results/**